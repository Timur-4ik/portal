<!DOCTYPE html>
<html>
<head><title>Вход</title></head>
<body>
    <h1>Авторизация</h1>
    <form method="post">
        {% csrf_token %}
        <p><label>Имя пользователя: <input type="text" name="username" required></label></p>
        <p><label>Пароль: <input type="password" name="password" required></label></p>
        <button type="submit">Войти</button>
    </form>
    <p>Еще не зарегистрированы? <a href="{% url 'register' %}">Создать аккаунт</a></p>
</body>
</html>
